<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Εξερευνήστε Λακωνία</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2 class="logo">Εξερευνήστε</h2>

    <!-- Υλική Πολιτιστική Κληρονομιά -->
    <div class="category">
      <div class="category-header">🏛️ Υλική Πολιτιστική Κληρονομιά</div>
      <div class="category-content">
        <button class="navBtn subBtn" data-target="ancient">Αρχαία Μνημεία</button>
        <button class="navBtn subBtn" data-target="churches">Εκκλησίες</button>
        <button class="navBtn subBtn" data-target="castles">Κάστρα</button>
      </div>
    </div>

    <!-- Άυλη Πολιτιστική Κληρονομιά -->
    <div class="category">
      <div class="category-header">🎭 Άυλη Πολιτιστική Κληρονομιά</div>
      <div class="category-content">
        <button class="navBtn subBtn" data-target="recipes">Συνταγές</button>
        <button class="navBtn subBtn" data-target="products">Προϊόντα</button>
        <button class="navBtn subBtn" data-target="costumes">Φορεσιές</button>
        <button class="navBtn subBtn" data-target="dances">Χοροί</button>
        <button class="navBtn subBtn" data-target="songs">Τραγούδια</button>
        <button class="navBtn subBtn" data-target="weaving">Υφαντική Τέχνη</button>
        <button class="navBtn subBtn" data-target="legends">Θρύλοι</button>
      </div>
    </div>

    <!-- Γεωφυσική Κληρονομιά -->
    <div class="category">
      <div class="category-header">⛰️ Γεωφυσική Κληρονομιά</div>
      <div class="category-content">
        <button class="navBtn subBtn" data-target="rivers">Ποτάμια</button>
        <button class="navBtn subBtn" data-target="caves">Σπήλαια</button>
        <button class="navBtn subBtn" data-target="gorges">Φαράγγια</button>
        <button class="navBtn subBtn" data-target="bridges">Γεφύρια</button>
      </div>
    </div>

  </div>

  <!-- Main content -->
  <div class="main">
    <div id="ancient" class="page"><div class="card"><h1>Αρχαία Μνημεία</h1></div></div>
    <div id="churches" class="page"><div class="card"><h1>Εκκλησίες</h1></div></div>
    <div id="castles" class="page"><div class="card"><h1>Κάστρα</h1></div></div>
    <div id="recipes" class="page"><div class="card"><h1>Συνταγές</h1></div></div>
    <div id="products" class="page"><div class="card"><h1>Προϊόντα</h1></div></div>
    <div id="costumes" class="page"><div class="card"><h1>Φορεσιές</h1></div></div>
    <div id="dances" class="page"><div class="card"><h1>Χοροί</h1></div></div>
    <div id="songs" class="page"><div class="card"><h1>Τραγούδια</h1></div></div>
    <div id="weaving" class="page"><div class="card"><h1>Υφαντική Τέχνη</h1></div></div>
    <div id="legends" class="page"><div class="card"><h1>Θρύλοι</h1></div></div>

    <div id="rivers" class="page">
      <div class="card">
        <h1>Ποτάμια</h1>
        <div id="map"></div>
      </div>
    </div>
    <div id="caves" class="page"><div class="card"><h1>Σπήλαια</h1></div></div>
    <div id="gorges" class="page"><div class="card"><h1>Φαράγγια</h1></div></div>
    <div id="bridges" class="page"><div class="card"><h1>Γεφύρια</h1></div></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
